services:
  - type: web
    name: blessvegs-agent-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_ORIGIN
        value: https://bvegs.github.io
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
